name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'site/**'
      - 'LICENSE-*'
      - '.github/FUNDING.yml'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'site/**'
      - 'LICENSE-*'
      - '.github/FUNDING.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: ""
            name: linux
          - os: ubuntu-latest
            features: "--features citadeldb/io-uring"
            name: linux-iouring
          - os: ubuntu-latest
            features: "-p citadeldb --test fips --features citadeldb/fips"
            name: linux-fips
          - os: windows-latest
            features: ""
            name: windows
          - os: macos-latest
            features: ""
            name: macos
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}
      - run: cargo test --workspace ${{ matrix.features }}

  # Opt-in citadel-ai backends the default workspace test skips; also proves wasm cfg-away.
  ai-backends:
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    name: citadel-ai backends
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ai-backends
      - name: clippy (backend + mcp + file-tools + command-tool features)
        run: cargo clippy -p citadeldb-ai --all-targets --features claude,openai,ollama,mcp-server,file-tools,command-tool -- -D warnings
      - name: test (backend + mcp + file-tools + command-tool features)
        run: cargo test -p citadeldb-ai --features claude,openai,ollama,mcp-server,file-tools,command-tool
      - name: mcp stdio server binary builds
        run: cargo build -p citadeldb-ai --bin citadel-mcp --features mcp-server
      - name: wasm32 compiles with features gated away to mock-only
        run: cargo build -p citadeldb-ai --target wasm32-unknown-unknown --features claude,openai,ollama
