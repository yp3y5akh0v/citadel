name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'site/**'
      - 'scripts/**'
      - 'LICENSE-*'
      - '.github/FUNDING.yml'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'site/**'
      - 'scripts/**'
      - 'LICENSE-*'
      - '.github/FUNDING.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: ""
            name: linux
          - os: ubuntu-latest
            features: "--features citadeldb/io-uring"
            name: linux-iouring
          - os: ubuntu-latest
            features: "-p citadeldb --test fips --features citadeldb/fips"
            name: linux-fips
          - os: windows-latest
            features: ""
            name: windows
          - os: macos-latest
            features: ""
            name: macos
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v5
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          df -h /
      - uses: dtolnay/rust-toolchain@stable
      # citadeldb-python is a pyo3 cdylib member; its test harness links libpython.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}
      - run: cargo test --workspace ${{ matrix.features }}

  # Opt-in citadel-ai backends the default workspace test skips; also proves wasm cfg-away.
  ai-backends:
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    name: citadel-ai backends
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ai-backends
      - name: clippy (backend + file-tools + command-tool features)
        run: cargo clippy -p citadeldb-ai --all-targets --features claude,openai,ollama,file-tools,command-tool -- -D warnings
      - name: test (backend + file-tools + command-tool features)
        run: cargo test -p citadeldb-ai --features claude,openai,ollama,file-tools,command-tool
      - name: citadel-mcp non-default combos (default candle-embed+hub is covered by the workspace jobs; cuda-embed is GPU-only/local)
        run: |
          cargo clippy -p citadeldb-mcp --all-targets --no-default-features -- -D warnings
          cargo clippy -p citadeldb-mcp --all-targets --no-default-features --features candle-embed -- -D warnings
          cargo test -p citadeldb-mcp --no-default-features
      - name: clippy citadel-python candle-embed surface (the lean wheel never builds it)
        run: cargo clippy -p citadeldb-python --all-targets --features candle-embed -- -D warnings
      - name: wasm32 compiles with features gated away to mock-only
        run: cargo build -p citadeldb-ai --target wasm32-unknown-unknown --features claude,openai,ollama

  # Build the wheel, run pytest, and type-check the stubs/facades.
  python:
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    name: python bindings
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: pip install maturin pytest numpy mypy
      - name: Build the wheel
        run: maturin build --profile dev --out dist
      - name: Install the wheel
        run: pip install --no-index --find-links dist citadeldb
      - name: pytest
        run: pytest python/tests -q
      - name: mypy (stubs + facades)
        run: mypy -p citadeldb
        env:
          MYPYPATH: python
