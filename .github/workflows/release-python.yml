name: Release Python

# Per-Python-version wheels (no abi3) for all platforms, published to PyPI on a tag.

on:
  push:
    tags:
      - "v[0-9]+.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheels (${{ matrix.platform.target }} on ${{ matrix.platform.runner }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64, manylinux: auto }
          - { runner: ubuntu-24.04-arm, target: aarch64, manylinux: auto }
          - { runner: macos-15-intel, target: x86_64, manylinux: "" }
          - { runner: macos-latest, target: aarch64, manylinux: "" }
          - { runner: windows-latest, target: x64, manylinux: "" }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist --find-interpreter
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  test:
    name: test (py${{ matrix.python }} on ${{ matrix.os }})
    needs: wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Install and test the wheel
        shell: bash
        run: |
          python -m pip install pytest numpy
          python -m pip install --no-index --find-links dist citadeldb
          python -m pytest python/tests -q

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    # Trusted Publishing (OIDC): configure a PyPI publisher for the `pypi` environment.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Skip files already on PyPI (e.g. a reserve sdist); makes re-runs idempotent.
          skip-existing: true
