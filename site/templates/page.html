{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ config.title }}{% endblock %}
{% block description %}{{ page.description | default(value=config.description) }}{% endblock %}

{% block content %}
<article class="page-wrap">
    <h1>{{ page.title }}</h1>
    <div class="prose">{{ page.content | safe }}</div>
</article>
{% endblock %}
