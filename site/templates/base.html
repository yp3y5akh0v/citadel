<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    <meta name="description" content="{{ config.description }}">
    <link rel="icon" href="{{ get_url(path='favicon.ico') }}" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ get_url(path='favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ get_url(path='favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ get_url(path='apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ get_url(path='site.webmanifest') }}">
    <link rel="stylesheet" href="{{ get_url(path='css/style.css', cachebust=true) }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a class="nav-logo" href="{{ config.base_url }}"><img src="{{ get_url(path='logo.png') }}" alt="" width="56" height="56">Citadel</a>
            <button class="nav-toggle" aria-label="Menu" onclick="this.classList.toggle('open');document.querySelector('.nav-links').classList.toggle('open')">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links">
                <a href="{{ get_url(path='@/blog/_index.md') }}">Blog</a>
                <a href="{{ get_url(path='@/demo/_index.md') }}">Playground</a>
                <a href="{{ get_url(path='@/about/_index.md') }}">About</a>
                <a href="{{ config.extra.github }}" target="_blank" rel="noopener">GitHub</a>
            </div>
        </div>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer"></footer>
</body>
</html>
